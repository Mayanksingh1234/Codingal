<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    .container{
        background-color: aqua;
    }
    .box{
        background-color: green;
        width: 300px;
        position: relative;
        height: 300px;
        /* animation: box1 2s;
        animation-iteration-count: 4; */
        transition: all 2s ease;
    }
    .box:hover{
        background-color: red;
        width: 400px;
        transform: rotate(90deg);
        /* top:300px; */
    }
    @keyframes box1{
        0%{
            left:0px;
            top:0px
        }
        25%{
            left:0px;
            top:100px
        }
        50%{
            left:100px;
            top:100px
        }
        75%{
            left:100px;
            top:0px
        }
        100%{
            left:0px;
            top:0px
        }
    }
    .spinner {
  width: 50px;
  height: 50px;
  border: 6px solid #ddd;
  border-top: 6px solid #3498db;
  border-radius: 50%;
  animation: spin 1s linear infinite;
}

@keyframes spin {
  0% { transform: rotate(0deg); }
  100% { transform: rotate(360deg); }
}

</style>
<body>
    <div class="container">
        <div class="box">
            this is my box
        </div>
        <div class="spinner"></div>
    </div>
</body>
</html>
